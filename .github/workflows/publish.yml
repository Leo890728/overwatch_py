name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  # Allow manual runs (e.g. re-publishing the same tag after a build-only fix).
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    # The environment name must match what you configure on PyPI under
    # "Manage → Publishing → Trusted publishers".
    environment:
      name: pypi
      url: https://pypi.org/project/overfast-client/
    permissions:
      # Required for OIDC token exchange with PyPI.
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1